name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check agent_recall_ai/ tests/

      - name: Type check with mypy
        run: mypy agent_recall_ai/ --ignore-missing-imports
        continue-on-error: true  # Warn but don't fail on type issues in CI

      - name: Run tests
        run: pytest tests/ -v --tb=short -q

  test-integrations:
    name: Integration Test (${{ matrix.extra }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: [openai, anthropic, semantic]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with ${{ matrix.extra }} extras
        run: pip install -e ".[${{ matrix.extra }},dev]"

      - name: Run core tests
        run: pytest tests/ -v --tb=short -q -k "not redis"

  test-redis:
    name: Test Redis Provider
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with Redis extras
        run: pip install -e ".[redis,dev]"

      - name: Run Redis tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/test_persistence.py -v --tb=short -k "redis or Redis"

  publish:
    name: Publish to PyPI
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch

      - name: Build distribution
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
